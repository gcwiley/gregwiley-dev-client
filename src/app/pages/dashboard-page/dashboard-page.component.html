<mat-sidenav-container class="sidenav-container">
	<mat-sidenav
		#drawer
		class="sidenav"
		fixedInViewport
		[attr.role]="
			(isHandset$ | async) || (isSmall$ | async) ? 'dialog' : 'navigation'
		"
		[mode]="(isHandset$ | async) || (isSmall$ | async) ? 'over' : 'side'"
		[opened]="(isHandset$ | async) || (isSmall$ | async) === false"
	>
		<mat-toolbar>
			<h1>Menu</h1>
		</mat-toolbar>
		<app-nav-menu></app-nav-menu>
	</mat-sidenav>
	<mat-sidenav-content>

		<app-header></app-header>

		<app-project-table></app-project-table>
	</mat-sidenav-content>
</mat-sidenav-container>
