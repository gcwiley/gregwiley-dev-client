<app-header></app-header>
<main class="signin-page-container">
	<form [formGroup]="signinForm" novalidate (ngSubmit)="onSubmitSignIn()">
		<mat-card class="signin-form">
			<h3 class="mat-headline-6">Sign In</h3>
			<!-- EMAIL (email) -->
			<mat-form-field class="full-width" appearance="outline">
				<mat-label>Username</mat-label>
				<input matInput type="email" formControlName="email" />
				<mat-error>Please enter your email address.</mat-error>
			</mat-form-field>

			<!-- PASSWORD (password) -->
			<mat-form-field class="full-width" appearance="outline">
				<mat-label>Password</mat-label>
				<input matInput type="password" formControlName="password" />
				<mat-error>Please enter your password.</mat-error>
			</mat-form-field>

			<div class="card-actions">
				<button mat-flat-button color="primary" type="submit">
					Sign In
				</button>
			</div>
		</mat-card>
	</form>
</main>
