<app-header></app-header>

<mat-grid-list class="container" [cols]="cols" [rowHeight]="rowHeight" [gutterSize]="gutterSize">

  <mat-grid-tile [colspan]="colspan">

    <mat-card class="about-me-text">
      
      <mat-card-header>
        <mat-card-title>About Me</mat-card-title>
      </mat-card-header>

      <mat-card-content>
        <p class="mat-headline-5">{{ bioText }}</p>
      </mat-card-content>

    </mat-card>

  </mat-grid-tile>

  <mat-grid-tile [colspan]="colspan">
    <app-topic-list class="topic-list"></app-topic-list>
  </mat-grid-tile>

</mat-grid-list>

<app-footer></app-footer>
