<mat-list class="recent-posts">
   <div mat-subheader>Recent Posts</div>
   @for (post of recentPosts; track post) {
   <mat-list-item>
      <mat-icon matListItemIcon>folder</mat-icon>
      <div matListItemTitle>{{ post.title }}</div>
      <div matListItemLine>{{ post.createdAt | date }}</div>
   </mat-list-item>
   }
</mat-list>
