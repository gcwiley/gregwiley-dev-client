<form [formGroup]="postForm" novalidate (ngSubmit)="onSavePost()">
   <!-- POST CARD -->
   <mat-card class="post-form">
      <!-- POST HEADER -->
      <mat-card-header>
         <mat-card-title>New Post</mat-card-title>
      </mat-card-header>

      <mat-card-content>
         <!-- POST TITLE (title)-->
         <mat-form-field class="full-width" appearance="outline">
            <mat-label>Post Title</mat-label>
            <input matInput type="text" formControlName="title" />
            <mat-error *ngIf="postForm.controls['title'].hasError('required')">Please enter a post title</mat-error>
         </mat-form-field>
      </mat-card-content>

      
   </mat-card>
</form>
