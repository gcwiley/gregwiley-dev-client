<form [formGroup]="postForm" novalidate (ngSubmit)="onSavePost()">
  <mat-card class="post-form">
    <mat-card-header>
      <mat-card-title>Add Post</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="row">
        <mat-form-field>
          <mat-label>Post Title</mat-label>
          <input type="text" formControlName="title" />
          <mat-error>Please enter a post title</mat-error>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>
</form>
