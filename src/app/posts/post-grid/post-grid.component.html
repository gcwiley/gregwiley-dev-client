<mat-grid-list [cols]="cols" [rowHeight]="rowHeight">
   <mat-grid-tile *ngFor="let post of posts">
      <mat-card>
         <mat-card-header>
            <mat-card-title>{{ post.title }}</mat-card-title>
            <mat-card-subtitle>{{ post.author }}</mat-card-subtitle>
         </mat-card-header>

         <mat-card-content>
            <p>{{ post.body }}</p>
         </mat-card-content>
      </mat-card>
   </mat-grid-tile>
</mat-grid-list>
