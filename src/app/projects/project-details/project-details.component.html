<mat-card class="project-details">
	<mat-list>
		<mat-list-item>
			<p>Project Status: {{ project.status }}</p>
		</mat-list-item>

		<mat-divider></mat-divider>

		<mat-list-item>
			<p>Project Category: {{ project.category }}</p>
		</mat-list-item>

		<mat-divider></mat-divider>

		<mat-list-item>
			<p>Programming Language: {{ project.language }}</p>
		</mat-list-item>

		<mat-divider></mat-divider>

		<mat-list-item>
			<p>Start Date: {{ project.startDate | date }}</p>
		</mat-list-item>

		<mat-divider></mat-divider>

		<mat-list-item>
			<p>Updated At: {{ project.updatedAt | date }}</p>
		</mat-list-item>
	</mat-list>
</mat-card>
