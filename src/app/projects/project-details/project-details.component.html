<section *ngIf="project" class="project-details-content">
  <header>
    <h2 class="project-title">{{ project.title }}</h2>
    <h3>{{ project.category }}</h3>
    <mat-divider></mat-divider>
  </header>

  <section>

    <main fxFlex="70">
      <!-- PROJECT DESCRIPTION -->
      <mat-card class="project-description">
        <mat-card-subtitle>Description</mat-card-subtitle>
        <mat-card-content>
          <p>{{ project.description }}</p>
        </mat-card-content>
      </mat-card>
    </main>

    <aside>
      <!-- PROJECT DETAILS -->

      <mat-card class="project-details">
        <mat-list dense>
          <mat-list-item>
            <h3 mat-line><strong>Status</strong></h3>
            <p>{{ project.status }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3 mat-line><strong>Category</strong></h3>
            <p>{{ project.category }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3 mat-line><strong>Language</strong></h3>
            <p>{{ project.language }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3 mat-line><strong>Start Date</strong></h3>
            <p>{{ project.startDate | date }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3 mat-line><strong>Lasted Updated</strong></h3>
            <p>{{ project.updatedAt | date }}</p>
          </mat-list-item>
        </mat-list>
      </mat-card>
    </aside>
  </section>
  
</section>
