<section *ngIf="project" class="page-details-container">

  <header>
    <h2 class="project-title">{{ project.title }}</h2>
    <mat-divider></mat-divider>
  </header>

  <section class="page-details-content">

    <main>
      <!-- PROJECT DESCRIPTION -->
      <mat-card class="project-description">
        <mat-card-subtitle>Description</mat-card-subtitle>
        <mat-card-content>
          <p>{{ project.description }}</p>
        </mat-card-content>
      </mat-card>

    </main>


    <aside>
      <!-- PROJECT DETAILS -->
      <mat-card class="project-details">
        <mat-list>
          <mat-list-item>
            <h3 mat-line><strong>Status</strong></h3>
            <p>{{ project.status }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3 mat-line><strong>Category</strong></h3>
            <p>{{ project.category }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3><strong>Language</strong></h3>
            <p>{{ project.language }}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3><strong>Start Date</strong></h3>
            <p>{{ project.startDate}}</p>
          </mat-list-item>

          <mat-divider></mat-divider>

          <mat-list-item>
            <h3><strong>Lasted Updated</strong></h3>
            <p>{{ project.updatedAt}}</p>
          </mat-list-item>
        </mat-list>
      </mat-card>
    </aside>
  </section>

</section>
