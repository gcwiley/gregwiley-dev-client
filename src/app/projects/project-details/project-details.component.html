<mat-card appearance="raised" class="project-details" *ngIf="project">
   <mat-list>
      <!-- STATUS -->
      <mat-list-item lines="2">
         <span matListItemTitle>Status</span>
         <p matListItemLine>{{ project.status }}</p>
      </mat-list-item>
      <!-- CATEGORY -->
      <mat-list-item lines="2">
         <span matListItemTitle>Category</span>
         <span matListItemLine>{{ project.category }}</span>
      </mat-list-item>
   </mat-list>
</mat-card>
