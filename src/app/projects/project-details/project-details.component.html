<mat-list *ngIf="project" class="project-details" role="list">
   <span mat-subheader>Project Details</span>
   <mat-list-item lines="2">
      <span matListItemTitle>Status</span>
      <span matListItemLine>{{ project.status }}</span>
   </mat-list-item>
   <mat-divider></mat-divider>
   <mat-list-item lines="2">
      <span matListItemTitle>Category</span>
      <span matListItemLine>{{ project.category }}</span>
   </mat-list-item>
   <mat-divider></mat-divider>
   <mat-list-item lines="2">
      <span matListItemTitle>Language Used</span>
      <span matListItemLine>{{ project.language }}</span>
   </mat-list-item>
   <mat-divider></mat-divider>
   <mat-list-item lines="2">
      <span matListItemTitle>Created</span>
      <span matListItemLine>{{ project.createdAt | date : 'medium' }}</span>
   </mat-list-item>
   <mat-divider></mat-divider>
   <mat-list-item lines="2">
      <span matListItemTitle>Last Updated</span>
      <span matListItemLine>{{ project.updatedAt | date : 'medium' }}</span>
   </mat-list-item>
</mat-list>
