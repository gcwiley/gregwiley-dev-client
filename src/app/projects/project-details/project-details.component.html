<mat-card class="project-details">
	<mat-list>
		<div mat-subheader>Project Details</div>
		<mat-list-item>
			<span matListItemTitle>Project Status</span>
			<span matListItemLine>{{ project.status }}</span>
		</mat-list-item>
		<mat-list-item>
			<span matListItemTitle>Project Category</span>
			<span matListItemLine>{{ project.category }}</span>
		</mat-list-item>
		<mat-list-item>
			<span matListItemTitle>Programming Language</span>
			<span matListItemLine>{{ project.language }}</span>
		</mat-list-item>
		<mat-divider></mat-divider>
		<mat-list-item>
			<span matListItemTitle>Start Date</span>
			<span matListItemLine>{{ project.startDate | date }}</span>
		</mat-list-item>
		<mat-list-item>
			<span matListItemTitle>Last Updated</span>
			<span matListItemLine>{{ project.updatedAt | date }}</span>
		</mat-list-item>
	</mat-list>
</mat-card>
