<div class="project-grid-container">

  <div *ngFor="let project of projects">

    <mat-card class="project-card">

      <mat-card-header>
        <mat-card-title>{{ project.title }}</mat-card-title>
        <mat-card-subtitle>{{ project.category }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p>{{ project.description }}</p>
      </mat-card-content>

      <mat-card-actions class="project-actions-container">
        <!-- ADD FLEX HERE -->

        <a mat-button color="primary" routerLink="/projects/{{ project._id }}">VIEW</a>

        <a mat-icon-button color="primary" href="{{ project.gitUrl }}">
          <mat-icon>code</mat-icon>
        </a>

        <!-- GIT HUB LINK ICON HERE -->
      </mat-card-actions>
    </mat-card>

  </div>

</div>
