<mat-grid-list class="grid-container" [cols]="cols" [rowHeight]="rowHeight" [gutterSize]="gutterSize">
  <mat-grid-tile *ngFor="let project of projects" [colspan]="colspan" [rowspan]="rowspan">
    <mat-card class="project-card">
      <!-- card header -->
      <mat-card-header>
        <mat-card-title>{{ project.title }}</mat-card-title>
        <mat-card-subtitle>{{ project.category }}</mat-card-subtitle>
      </mat-card-header>

      <span class="spacer"></span>

      <!-- card content -->
      <mat-card-content>
        <p>{{ project.description | simpletruncate }}</p>
      </mat-card-content>

      <mat-card-actions>
        <a mat-button color="primary" routerLink="/projects/{{ project._id }}">OPEN</a>
        <span class="spacer"></span>
        <a mat-icon-button color="primary" href="{{ project.gitUrl }}" disabled>
          <mat-icon>code</mat-icon>
        </a>
      </mat-card-actions>
    </mat-card>
  </mat-grid-tile>
</mat-grid-list>
