<div class="grid-container">
   <header class="header-content">
      <h5 class="mat-headline-5">Featured Projects</h5>
      <a mat-stroked-button color="primary" routerLink="/projects">VIEW ALL PROJECTS</a>
   </header>

   <mat-grid-list [cols]="cols" [rowHeight]="rowHeight" [gutterSize]="gutterSize">
      <mat-grid-tile *ngFor="let recentProject of recentProjects" [colspan]="colspan" [rowspan]="rowspan">
         <mat-card class="project-card">
            <mat-card-header>
               <mat-card-title>{{ recentProject.title }}</mat-card-title>
               <mat-card-subtitle>{{ recentProject.category }}</mat-card-subtitle>
            </mat-card-header>

            <mat-card-content>
               <p>{{ recentProject.description }}</p>
            </mat-card-content>

            <span class="spacer"></span>

            <mat-card-actions>
               <a mat-button color="accent" routerLink="/projects/{{ recentProject._id }}">VIEW</a>
               <span class="spacer"></span>
               <a mat-icon-button color="primary" href="{{ recentProject.gitUrl }}" disabled>
                  <mat-icon>code</mat-icon>
               </a>
            </mat-card-actions>
         </mat-card>
      </mat-grid-tile>
   </mat-grid-list>
</div>
