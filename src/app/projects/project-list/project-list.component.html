<a mat-flat-button routerLink="/create-project">Add Project</a>

<input type="text">

<table mat-table [dataSource]="dataSource" class="project-table mat-elevation-z1">
   <!-- title column -->
   <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Title</th>
      <td mat-cell *matCellDef="let project">{{ project.title }}</td>
   </ng-container>

   <!-- status column -->
   <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let project">{{ project.status }}</td>
   </ng-container>

   <!-- category column -->
   <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef>Category</th>
      <td mat-cell *matCellDef="let project">{{ project.category }}</td>
   </ng-container>

   <!-- language column -->
   <ng-container matColumnDef="language">
      <th mat-header-cell *matHeaderCellDef>Language</th>
      <td mat-cell *matCellDef="let project">{{ project.language }}</td>
   </ng-container>

   <!-- start date -->
   <ng-container matColumnDef="startDate">
      <th mat-header-cell *matHeaderCellDef>Start Date</th>
      <td mat-cell *matCellDef="let project">{{ project.startDate | date : 'short' }}</td>
   </ng-container>

   <!-- delete project icon button -->
   <ng-container matColumnDef="deleteProject">
      <th mat-header-cell *matHeaderCellDef>Delete</th>
      <td mat-cell *matCellDef="let project">
         <button
            mat-icon-button
            color="warn"
            (click)="onDeleteProject(project._id)"
            matTooltip="Delete project"
            aria-label="Delete project">
            <mat-icon>delete</mat-icon>
         </button>
      </td>
   </ng-container>

   <!-- favorite project icon button -->
   <ng-container matColumnDef="favoriteProject">
      <th mat-header-cell *matHeaderCellDef>Favorite</th>
      <td mat-cell *matCellDef="let project">
         <button
            mat-icon-button
            color="accent"
            (click)="onFavoriteProject()"
            disabled
            matTooltip="Add project to favorites"
            aria-label="Add project to favorites">
            <mat-icon>star</mat-icon>
         </button>
      </td>
   </ng-container>

   <!-- edit project icon button -->
   <ng-container matColumnDef="editProject">
      <th mat-header-cell *matHeaderCellDef>Edit</th>
      <td mat-cell *matCellDef="let project">
         <a
            mat-icon-button
            color="primary"
            routerLink="/edit/{{ project._id }}"
            matTooltip="Edit project"
            aria-label="Edit project">
            <mat-icon>edit</mat-icon>
         </a>
      </td>
   </ng-container>

   <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
   <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
</table>
