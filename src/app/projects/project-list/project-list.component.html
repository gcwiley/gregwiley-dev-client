<table mat-table [dataSource]="dataSource" multiTemplateDataRows>
   <!-- loops through all project columns -->
   <ng-container matColumnDef="{{ column }}" *ngFor="let column of columnsToDisplay">
      <th mat-header-cell *matHeaderCellDef>{{ column | uppercase }}</th>
      <td mat-cell *matCellDef="let project">{{ project[column] }}</td>
   </ng-container>

   <ng-container matColumnDef="expand">
      <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
      <td mat-cell *matCellDef="let project">
         <button
            mat-icon-button
            aria-label="expand row"
            (click)="expandedProject = expandedProject === project ? null : project; $event.stopPropagation()">
            <mat-icon *ngIf="expandedProject !== project">keyboard_arrow_down</mat-icon>
            <mat-icon *ngIf="expandedProject === project">keyboard_arrow_up</mat-icon>
         </button>
      </td>
   </ng-container>

   <!-- Expanded Content Column - The detail row is made up of this one column that spans across all columns -->
   <ng-container matColumnDef="expandedDetail">
      <td mat-cell *matCellDef="let project" [attr.colspan]="columnsToDisplayWithExpand.length">
         <div class="project-detail" [@detailExpand]="project === expandedProject ? 'expanded' : 'collapsed'">
            <div class="example-element-description">{{ project.description }}</div>
         </div>
      </td>
   </ng-container>

   <tr mat-header-row *matHeaderRowDef="columnsToDisplayWithExpand"></tr>
   <tr
      mat-row
      *matRowDef="let project; columns: columnsToDisplayWithExpand"
      class="project-row"
      [class.expanded-row]="expandedProject === project"
      (click)="expandedProject = expandedProject === project ? null : project"></tr>
   <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="detail-row"></tr>
</table>
