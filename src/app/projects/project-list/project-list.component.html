<table mat-table [dataSource]="dataSource" matSort multiTemplateDataRows class="mat-elevation-z0">
  <!-- PROJECT TITLE -->
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>PROJECT TITLE</th>
    <td mat-cell *matCellDef="let project">
      {{ project.title }}
    </td>
  </ng-container>

  <!-- PROJECT STATUS -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>PROJECT STATUS</th>
    <td mat-cell *matCellDef="let project">
      {{ project.status }}
    </td>
  </ng-container>

  <!-- PROJECT CATEGORY -->
  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>PROJECT CATEGORY</th>
    <td mat-cell *matCellDef="let project">
      {{ project.category }}
    </td>
  </ng-container>

  <!-- PROJECT LANGUAGE -->
  <ng-container matColumnDef="language">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>PROJECT LANGUAGE</th>
    <td mat-cell *matCellDef="let project">
      {{ project.language }}
    </td>
  </ng-container>

  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let project" [attr.colspan]="columnsToDisplay.length">
      <div
        class="example-element-detail"
        [@detailExpand]="project === expandedProject ? 'expanded' : 'collapsed'">
        <div class="observation-description">
          <h3>Project Description</h3>

          <p>{{ project.description }}</p>

          <!-- EDIT PROJECT -->
          <a mat-icon-button routerLink="['/edit', project._id]">
            <mat-icon>edit</mat-icon>
          </a>

          <!-- DELETE OBSERVATION -->
          <button mat-icon-button color="warn" (click)="onDeleteProject(project._id)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
  <tr
    mat-row
    *matRowDef="let project; columns: columnsToDisplay"
    class="example-element-row"
    [class.example-expanded-row]="expandedProject === project"
    (click)="expandedProject = expandedProject === project ? null : project"></tr>
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
</table>
