<mat-card class="recent-projects">
	<mat-list>

		<div mat-subheader>Recently Added Projects</div>

		<mat-list-item *ngFor="let project of recentProjects">
			<div matListItemLine>{{ project.title }}</div>
			<div matListItemMeta><strong>{{ project.createdAt | date }}</strong></div>
		</mat-list-item>

	</mat-list>
</mat-card>
