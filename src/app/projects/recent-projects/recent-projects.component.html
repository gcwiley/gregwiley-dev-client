<mat-card>
	<mat-list>
		<div mat-subheader>Recent Projects</div>
		<mat-list-item *ngFor="let project of recentProjects">
			<mat-icon matListItemIcon>folder</mat-icon>
			<div matListItemTitle>{{ project.title }}</div>
			<div matListItemLine>{{ project.createdAt | date }}</div>
		</mat-list-item>
	</mat-list>
</mat-card>
