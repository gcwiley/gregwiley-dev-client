<div class="container mat-elevation-z8">
	<!-- LOADING SPINNER -->
	<div class="loading-shade" *ngIf="isLoadingResults">
		<mat-spinner *ngIf="isLoadingResults"></mat-spinner>
		<div>Loading Issue Table</div>
	</div>

	<div class="issue-table-container">
		<table mat-table [dataSource]="dataSource">
			<!-- Title Column -->
			<ng-container matColumnDef="title">
				<th mat-header-cell *matHeaderCellDef>Title</th>
				<td mat-cell *matCellDef="let issue">{{ issue.title }}</td>
			</ng-container>

			<!-- Category Column -->
			<ng-container matColumnDef="Category">
				<th mat-header-cell *matHeaderCellDef>Title</th>
				<td mat-cell *matCellDef="let issue">{{ issue.category }}</td>
			</ng-container>

			<!-- Category Column -->
			<ng-container matColumnDef="Status">
				<th mat-header-cell *matHeaderCellDef>Status</th>
				<td mat-cell *matCellDef="let issue">{{ issue.status }}</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
			<tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
		</table>
	</div>
</div>
