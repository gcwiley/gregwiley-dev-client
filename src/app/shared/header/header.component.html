<mat-toolbar color="primary">
	<a mat-icon-button routerLink="/" aria-label="menu icon">
		<mat-icon>code</mat-icon>
	</a>

	<span class="header-text">gregwiley.dev</span>

	<span class="spacer"></span>

	<!-- toggle theme button -->
	<button
		mat-icon-button
		(click)="toggleTheme()"
		matTooltip="Toggle theme"
		attr.aria-label="Switch to {{ isDark ? 'light' : 'dark' }} theme"
		color="accent"
	>
		<mat-icon>brightness_medium</mat-icon>
	</button>

	<!-- Account Button -->
	<button
		mat-icon-button
		matTooltip="Admin Signin"
		[matMenuTriggerFor]="menu"
		aria-label="account menu"
	>
		<mat-icon>account_circle</mat-icon>
	</button>

	<mat-menu #menu="matMenu">
		<!-- If user is signed in -->
		<ng-container *ngIf="auth.user | async as user; else showSignInTest">
			<!-- admin dashbord -->
			<a mat-menu-item routerLink="/admin">
				<mat-icon>dashboard</mat-icon>
				<span>Admin Dashboard</span>
			</a>

			<!-- issues table -->
			<a mat-menu-item routerLink="/issues">
				<mat-icon>code</mat-icon>
				<span>Issues</span>
			</a>

			<!-- sign out button -->
			<button mat-menu-item (click)="onClickSignOut()">
				<mat-icon>logout</mat-icon>
				<span>Sign Out</span>
			</button>
		</ng-container>

		<!-- if user is NOT signed in -->
		<ng-template #showSignInTest>
			<a mat-menu-item routerLink="/signin">
				<mat-icon>login</mat-icon>
				<span>Sign In</span>
			</a>
		</ng-template>
	</mat-menu>
</mat-toolbar>
