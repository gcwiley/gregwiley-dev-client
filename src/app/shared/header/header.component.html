<mat-toolbar color="primary">
  <a mat-icon-button routerLink="/" aria-label="code icon">
    <mat-icon>home</mat-icon>
  </a>

  <span>gregwiley.dev</span>

  <span class="spacer"></span>

  <button mat-icon-button matTooltip="Submit Feedback" [matMenuTriggerFor]="feedbackMenu" aria-label="submit feedback">
    <mat-icon>help</mat-icon>
  </button>

  <!-- FEEDBACK MENU -->
  <mat-menu #feedbackMenu="matMenu">
    <!-- support page -->
    <a mat-menu-item routerLink="/submit-feedback">
      <mat-icon>bug_report</mat-icon>
      <span>Submit Feedback</span>
    </a>
  </mat-menu>

  <!-- toggle theme button -->
  <button
    mat-icon-button
    (click)="toggleTheme()"
    matTooltip="Toggle theme"
    attr.aria-label="Switch to {{ isDark ? 'light' : 'dark' }} theme"
    color="accent"
    disabled>
    <mat-icon>brightness_medium</mat-icon>
  </button>

  <!-- Account Button -->
  <button mat-icon-button matTooltip="Admin Signin" [matMenuTriggerFor]="menu" aria-label="account menu">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #menu="matMenu">
    <!-- If user is signed in -->
    <ng-container *ngIf="auth.user | async as user; else showSignIn">

      <!-- admin dashbord -->
      <a mat-menu-item routerLink="/admin">
        <mat-icon>dashboard</mat-icon>
        <span>Admin Dashboard</span>
      </a>

      <!-- issue tracker page -->
      <a mat-menu-item routerLink="/issues">
        <mat-icon>bug_report</mat-icon>
        <span>Issue Tracker</span>
      </a>

      <!-- sign out button -->
      <button mat-menu-item (click)="onClickSignOut()">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </ng-container>

    <!-- if user is NOT signed in -->
    <ng-template #showSignIn>
      <a mat-menu-item routerLink="/signin">
        <mat-icon>login</mat-icon>
        <span>Sign In</span>
      </a>
    </ng-template>
  </mat-menu>
</mat-toolbar>
