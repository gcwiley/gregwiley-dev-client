<header class="hero-container">
   <div class="hero-content">
      <img class="hero-image" src="../../../assets/logos/cube-svgrepo-com.svg" alt="logo" width="72" height="57" />

      <h1 class="mat-headline-2">{{ title }}</h1>

      <h3 class="mat-headline-5 subtitle">{{ subtitle }}</h3>

      <div class="hero-actions">
         <a mat-fab color="accent" routerLink="/about" extended>
            <mat-icon>info</mat-icon>About
         </a>
         <a mat-fab color="primary" routerLink="/blog" extended>
            <mat-icon>feed</mat-icon>Blog</a>
      </div>
   </div>
</header>
